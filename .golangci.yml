linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - gocritic
    - gofmt
    - goimports
    - misspell
    - revive

linters-settings:
  gocritic:
    enabled-tags:
      - diagnostic
      - style
    disabled-checks:
      - hugeParam
  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
  govet:
    enable-all: true
    disable:
      - fieldalignment

issues:
  exclude-dirs:
    - docs
    - examples
  max-issues-per-linter: 50
  max-same-issues: 5

run:
  timeout: 5m
  go: "1.24"
