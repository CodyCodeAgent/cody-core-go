name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What's the use case?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe how you'd like this to work. Include API sketches if possible.
      placeholder: |
        ```go
        // Example API sketch:
        a := agent.New[MyDeps, MyOutput](model,
            agent.WithNewFeature(...),
        )
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered.

  - type: dropdown
    id: package
    attributes:
      label: Affected Package
      options:
        - agent
        - output
        - direct
        - deps
        - testutil
        - other
    validations:
      required: true
