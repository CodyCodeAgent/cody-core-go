name: Bug Report
description: Report a bug in cody-core-go
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the issue.
      placeholder: |
        ```go
        a := agent.New[agent.NoDeps, string](model)
        result, err := a.Run(ctx, "hello", agent.NoDeps{})
        // Expected: ...
        // Got: ...
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages if applicable.
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go Version
      description: Output of `go version`
      placeholder: "go1.24.7 linux/amd64"
    validations:
      required: true

  - type: input
    id: module-version
    attributes:
      label: cody-core-go Version
      description: Version or commit hash you're using
      placeholder: "v0.1.0 or commit abc1234"
    validations:
      required: true
